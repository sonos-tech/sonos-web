
name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ${{ vars.REGISTRY_DOMAIN }}/${{ vars.HARBOR_USER }}/${{ github.event.repository.name }}

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch build envs
        run: |
          curl -sf -X POST "https://${{ vars.ENVS_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.ENVS_TOKEN }}" \
            -d '{"repo":"${{ github.event.repository.name }}"}' > /tmp/build.env
          while IFS='=' read -r key value; do
            [[ -n "$value" && ! "$key" =~ ^# ]] && echo "::add-mask::$value"
          done < /tmp/build.env
          if ! grep -q '^HACKATON_BUILD_ENVS=loaded' /tmp/build.env; then
            echo "::error::Build envs not loaded — webhook returned invalid response"
            exit 1
          fi
          grep -v '^HACKATON_BUILD_ENVS=' /tmp/build.env | grep -v '^#' | grep '=' > /tmp/build-clean.env || true

      - name: Parse build args
        id: build-envs
        run: |
          {
            echo 'args<<EOF'
            cat /tmp/build-clean.env
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Login
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_DOMAIN }}
          username: ${{ vars.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          build-args: ${{ steps.build-envs.outputs.args }}
          cache-from: type=local,src=/tmp/docker-cache/${{ github.repository }}
          cache-to: type=local,dest=/tmp/docker-cache/${{ github.repository }},mode=max
